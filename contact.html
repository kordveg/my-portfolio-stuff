    <!-- Navigation Header -->

        <div class="theme-switch-container">

    <!-- Main Contact Section -->
    <section class="contact-section">
        <h2>Get in Touch</h2>
        <p>For freelance inquiries, technical creative projects, or professional opportunities, reach out through the links below.</p>
        
        <div class="contact-grid">
            <!-- Gmail Card -->
            <a href="mailto:ccurtis5649@gmail.com" class="contact-card">
                <div class="contact-vector-icon">
                    <svg viewBox="0 0 24 24" width="30" height="30" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </div>
                <h3>Email</h3>
                <p>ccurtis5649@gmail.com</p>
            </a>

            <!-- Perfectly Traced Rounded-Square Wireframe LinkedIn Icon -->
            <a href="https://linkedin.com" target="_blank" class="contact-card">
                <div class="contact-vector-icon">
                    <svg viewBox="0 0 24 24" width="30" height="30" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <!-- Outer rounded corporate box container matching your reference layout -->
                        <rect x="2" y="2" width="20" height="20" rx="4" ry="4"></rect>
                        <!-- The letter "i" stem and dot inside the box -->
                        <line x1="8" y1="11" x2="8" y2="17"></line>
                        <circle cx="8" cy="7.5" r="0.5" fill="currentColor"></circle>
                        <!-- The letter "n" structure cleanly positioned -->
                        <path d="M12 17v-6a2 2 0 0 1 2-2 2 2 0 0 1 2 2v6"></path>
                    </svg>
                </div>
                <h3>LinkedIn</h3>
                <p>Connor Curtis</p>
            </a>
        </div>
    </section>

    <!-- Universal Footer -->
    <footer class="site-footer">
        <p class="footer-credits" style="margin-bottom: 8px;">Based in Dallas, TX</p>
        <p class="footer-credits">© 2026 Built by yours truly</p>
    </footer>

    <!-- Script to handle light/dark logic -->
    <script src="script.js"></script>
