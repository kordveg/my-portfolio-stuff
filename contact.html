<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | My Portfolio</title>
    <!-- JetBrains Mono Font -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Link for Sleek Social & Contact Widgets -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Header -->
    <header class="main-header">
        <nav class="nav-links">
            <a href="index.html">Work</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
        
        <!-- Theme Toggle Switch -->
        <div class="theme-switch-container">
            <button id="theme-toggle" aria-label="Toggle dark and light mode">
                <span class="switch-handle"></span>
            </button>
        </div>
    </header>

    <section class="contact-section">
        <h1>Get in Touch</h1>
        <p>Whether it's for a creative freelance project, university collaboration, or professional employment, feel free to reach out!</p>
        
        <div class="contact-container">
            <!-- Email Method -->
            <div class="contact-method">
                <i class="fa-regular fa-envelope"></i>
                <div class="contact-details">
                    <h3>Email</h3>
                    <p>your-utd-email@utdallas.edu</p>
                </div>
            </div>

            <!-- Location Method -->
            <div class="contact-method">
                <i class="fa-solid fa-location-dot"></i>
                <div class="contact-details">
                    <h3>Location</h3>
                    <p>Richardson / Dallas, TX</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Universal Footer Widget Bar -->
    <footer class="site-footer">
        <div class="footer-widgets">
            <!-- Replace the # links with your actual URLs later! -->
            <a href="#" target="_blank" aria-label="ArtStation"><i class="fa-brands fa-artstation"></i></a>
            <a href="#" target="_blank" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" target="_blank" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#" target="_blank" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
        </div>
        <p class="footer-credits">© 2026 Built from scratch by Me</p>
    </footer>

    <!-- Script to handle light/dark logic -->
    <script src="script.js"></script>
</body>
</html>
